<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folders Todo</title>
<link rel="stylesheet" href="todo list.css">
</head>

<body>

<h2>Create Folder</h2>

<input type="text" id="folderInput" placeholder="Folder name">
<button id="createFolderBtn">Create Folder</button>

<hr>

<div id="foldersContainer"></div>




<!-- todo list setting script  -->
<script>

let folders = JSON.parse(localStorage.getItem("folders")) || [];

function saveFolders(){
    localStorage.setItem("folders", JSON.stringify(folders));
}



function renderFolders(){
    const container = document.getElementById("foldersContainer");
    container.innerHTML = "";

    folders.forEach((folder,index)=>{
        const div = document.createElement("div");
        div.classList.add("folder-card"); // glass card

        let tasks = JSON.parse(localStorage.getItem("tasks_"+folder.name)) || [];

        div.innerHTML = `
        <h3>${folder.name}</h3>

        <input type="text" id="taskInput${index}" placeholder="Enter task">
        <button onclick="addTask(${index})" class="add-btn">Add</button>
        <button onclick="deleteFolder(${index})" class="delete-btn">Delete Folder</button>

        <ul id="taskList${index}"></ul>
        `;

        container.appendChild(div);

        // Add keypress listener for Enter on the task input
        document.getElementById("taskInput" + index).addEventListener("keypress", (event) => {
            if (event.key === "Enter") {
                addTask(index);
            }
        });

        const ul = div.querySelector("ul");

        tasks.forEach((task,i)=>{
            const li = document.createElement("li");
            li.innerHTML = `
            <span class="${task.done ? 'done' : ''}">${task.text}</span>
            <div>
                <button onclick="doneTask(${index},${i})" class="done-btn">Done</button>
                <button onclick="deleteTask(${index},${i})" class="delete-btn">X</button>
            </div>
            `;
            ul.appendChild(li);
        });
    });
}



// ===== TASK FUNCTIONS =====
function addTask(folderIndex){
    const folder = folders[folderIndex];
    const input = document.getElementById("taskInput"+folderIndex);
    let tasks = JSON.parse(localStorage.getItem("tasks_"+folder.name)) || [];
    const value = input.value.trim();
    if(value){
        tasks.push({text:value, done:false});
        localStorage.setItem("tasks_"+folder.name,JSON.stringify(tasks));
        input.value="";
        renderFolders();
    }
}



function doneTask(folderIndex,taskIndex){
    const folder = folders[folderIndex];
    let tasks = JSON.parse(localStorage.getItem("tasks_"+folder.name)) || [];
    tasks[taskIndex].done = !tasks[taskIndex].done;
    localStorage.setItem("tasks_"+folder.name,JSON.stringify(tasks));
    renderFolders();
}

function deleteTask(folderIndex,taskIndex){
    const folder = folders[folderIndex];
    let tasks = JSON.parse(localStorage.getItem("tasks_"+folder.name)) || [];
    tasks.splice(taskIndex,1);
    localStorage.setItem("tasks_"+folder.name,JSON.stringify(tasks));
    renderFolders();
}

function deleteFolder(index){
    localStorage.removeItem("tasks_"+folders[index].name);
    folders.splice(index,1);
    saveFolders();
    renderFolders();
}


// ===== CREATE FOLDER =====



document.getElementById("createFolderBtn").addEventListener("click",()=>{
    const input = document.getElementById("folderInput");
    const value = input.value.trim();
    if(value){
        folders.push({name:value});
        saveFolders();
        renderFolders();
        input.value="";
    }
});


document.getElementById("folderInput").addEventListener("keypress", (event) => {
    if(event.key === "Enter"){
        const input = document.getElementById("folderInput");
        const value = input.value.trim();
        if(value){
            folders.push({name:value});  // Fixed: push to folders, not tasks
            saveFolders();
            renderFolders();
            input.value="";
        }
    }
});




renderFolders();
</script>
 <!-- todo list setting script  -->


<script> 




</script>




</body>
</html>
